name: Build Telegram Sender Executables

on:
  push:
    branches: [ "main" , "master" ]
  pull_request:
    branches: [ "main" , "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.10']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # تحديث إلى v4 أيضاً (اختياري لكن مستحسن)

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5 # تحديث إلى v5 (متوافق مع v4)
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile `
          --name "TelegramSender_Windows" `
          --hidden-import pandas `
          --hidden-import telethon `
          --hidden-import nest_asyncio `
          --hidden-import openpyxl `
          telegram_sender.py

    - name: Build with PyInstaller (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile \
          --name "TelegramSender_Ubuntu" \
          --hidden-import pandas \
          --hidden-import telethon \
          --hidden-import nest_asyncio \
          --hidden-import openpyxl \
          telegram_sender.py

    - name: Upload Windows executable
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4  # التحديث الأساسي: من v3 إلى v4
      with:
        name: TelegramSender-Windows
        path: dist/TelegramSender_Windows.exe

    - name: Upload Ubuntu executable
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4  # التحديث الأساسي: من v3 إلى v4
      with:
        name: TelegramSender-Ubuntu
        path: dist/TelegramSender_Ubuntu
